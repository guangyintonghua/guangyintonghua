{% extends "base.html" %}
{% block title %}设置 - 小学数学智能练习{% endblock %}

{% block content %}
<div class="page-title">⚙️ 系统设置</div>

<div class="grid-2 gap-16">
  <!-- 学生管理 -->
  <div>
    <div class="card mb-16">
      <div class="section-title">学生管理</div>
      <div id="student-list" class="mb-16"></div>
      <div style="border-top:1px solid var(--border);padding-top:16px">
        <div class="text-sm text-secondary mb-8">添加新学生</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input class="form-control" id="new-name" placeholder="姓名">
          <select class="form-control" id="new-grade">
            <option>一年级</option><option>二年级</option><option selected>三年级</option>
            <option>四年级</option><option>五年级</option><option>六年级</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="addStudent()">+ 添加学生</button>
      </div>
    </div>
  </div>

  <!-- API 配置 -->
  <div>
    <div class="card mb-16">
      <div class="section-title">API 配置</div>
      <div class="form-group">
        <label class="form-label">API Key</label>
        <input class="form-control" id="api-key" type="password" placeholder="sk-xxxxxxxx">
      </div>
      <div class="form-group">
        <label class="form-label">API 地址</label>
        <input class="form-control" id="api-base" placeholder="https://api.deepseek.com">
      </div>
      <div class="form-group">
        <label class="form-label">对话模型</label>
        <input class="form-control" id="model-chat" placeholder="deepseek-chat">
      </div>
      <button class="btn btn-primary" onclick="saveAPI()">保存 API 配置</button>
    </div>

    <div class="card mb-16">
      <div class="section-title">默认配置</div>
      <div class="form-group">
        <label class="form-label">默认年级</label>
        <select class="form-control" id="def-grade">
          <option>一年级</option><option>二年级</option><option>三年级</option>
          <option>四年级</option><option>五年级</option><option>六年级</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">地区 / 教材版本</label>
        <select class="form-control" id="def-region">
          <option>全国通用</option><option>北京</option><option>上海</option>
          <option>广东</option><option>浙江</option><option>江苏</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="saveGeneral()">保存默认配置</button>
    </div>

    <!-- 成就徽章 -->
    <div class="card">
      <div class="section-title">我的成就</div>
      <div id="badge-list">
        <div class="text-hint text-sm">加载中...</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allStudents = [];

async function init() {
  const [cfg, students] = await Promise.all([
    apiFetch("/api/settings/full"),
    apiFetch("/api/students"),
  ]);
  allStudents = students;

  document.getElementById("api-key").value   = cfg.api_key || "";
  document.getElementById("api-base").value  = cfg.api_base_url || "https://api.deepseek.com";
  document.getElementById("model-chat").value= cfg.model_chat || "deepseek-chat";
  document.getElementById("def-grade").value = cfg.default_grade || "三年级";
  document.getElementById("def-region").value= cfg.region || "全国通用";

  renderStudentList(students, cfg.default_student_id);
}

function renderStudentList(students, currentId) {
  const el = document.getElementById("student-list");
  if (students.length === 0) {
    el.innerHTML = '<div class="text-hint text-sm">暂无学生，请添加</div>';
    return;
  }
  el.innerHTML = students.map(s => `
    <div style="display:flex;align-items:center;padding:10px;border-radius:8px;
      background:${String(s.id) === String(currentId) ? "var(--primary-light)" : "var(--body-bg)"};
      margin-bottom:8px">
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">
          ${String(s.id) === String(currentId) ? "✓ " : ""}${s.name}
        </div>
        <div class="text-hint text-sm">${s.grade}</div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="selectStudent(${s.id})"
        ${String(s.id) === String(currentId) ? "disabled" : ""}>
        ${String(s.id) === String(currentId) ? "当前" : "选择"}
      </button>
      <button class="btn btn-sm btn-danger" style="margin-left:6px" onclick="deleteStudent(${s.id})">删除</button>
    </div>
  `).join("");
}

async function selectStudent(id) {
  await apiFetch("/api/settings", {method:"PUT", body: JSON.stringify({default_student_id: String(id)})});
  toast("已切换学生", "success");
  init();
}

async function addStudent() {
  const name  = document.getElementById("new-name").value.trim();
  const grade = document.getElementById("new-grade").value;
  if (!name) { toast("请输入姓名", "error"); return; }
  await apiFetch("/api/students", {method:"POST", body: JSON.stringify({name, grade})});
  document.getElementById("new-name").value = "";
  toast("添加成功", "success");
  init();
}

async function deleteStudent(id) {
  if (!confirm("确定删除该学生？历史数据不会删除。")) return;
  await apiFetch(`/api/students/${id}`, {method:"DELETE"});
  toast("已删除", "info");
  init();
}

async function saveAPI() {
  const body = {
    api_key:      document.getElementById("api-key").value.trim(),
    api_base_url: document.getElementById("api-base").value.trim(),
    model_chat:   document.getElementById("model-chat").value.trim(),
  };
  await apiFetch("/api/settings", {method:"PUT", body: JSON.stringify(body)});
  toast("API 配置已保存", "success");
}

async function saveGeneral() {
  const body = {
    default_grade: document.getElementById("def-grade").value,
    region:        document.getElementById("def-region").value,
  };
  await apiFetch("/api/settings", {method:"PUT", body: JSON.stringify(body)});
  toast("配置已保存", "success");
}

async function loadBadges() {
  const s = await apiFetch("/api/students/current").catch(() => null);
  const el = document.getElementById("badge-list");
  if (!s) {
    el.innerHTML = '<div class="text-hint text-sm">请先选择学生</div>';
    return;
  }
  const badges = s.badges || [];
  if (badges.length === 0) {
    el.innerHTML = `
      <div style="color:var(--text-hint);font-size:13px;margin-bottom:12px">
        还没有成就，继续练习解锁！
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${renderLockedBadges()}</div>
    `;
    return;
  }
  const earnedKeys = new Set(badges.map(b => b.key));
  el.innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      ${badges.map(b => `
        <div title="${b.desc}\n获得于 ${b.earned_at.slice(0,10)}"
          style="display:flex;flex-direction:column;align-items:center;gap:4px;
            padding:12px 16px;border-radius:12px;
            background:linear-gradient(135deg,#fff8e1,#fff3cd);
            border:1.5px solid #f9ca24;cursor:default;min-width:72px">
          <div style="font-size:28px">${b.icon}</div>
          <div style="font-size:11px;font-weight:700;color:#856404">${b.name}</div>
          <div style="font-size:10px;color:#a07a0a">${b.earned_at.slice(0,10)}</div>
        </div>
      `).join("")}
    </div>
    <div style="font-size:12px;color:var(--text-hint);margin-bottom:6px">未解锁</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${renderLockedBadges(earnedKeys)}</div>
  `;
}

function renderLockedBadges(earnedKeys = new Set()) {
  const ALL_BADGES = [
    {key:"first_exam",    icon:"🎉", name:"初试牛刀",  desc:"完成第一套试卷"},
    {key:"streak_3",      icon:"🔥", name:"三日连胜",  desc:"连续3天练习"},
    {key:"streak_7",      icon:"⚡", name:"一周不停",  desc:"连续7天练习"},
    {key:"streak_30",     icon:"🏆", name:"月度冠军",  desc:"连续30天练习"},
    {key:"perfect_score", icon:"💯", name:"满分王",    desc:"获得一次满分"},
    {key:"questions_100", icon:"📚", name:"百题斗士",  desc:"累计完成100道题"},
    {key:"questions_500", icon:"🌟", name:"数学达人",  desc:"累计完成500道题"},
    {key:"speed_ace",     icon:"🚀", name:"口算飞人",  desc:"口算速练20题全对"},
    {key:"kp_master",     icon:"🎯", name:"知识点精通",desc:"任一知识点掌握度达90%"},
  ];
  return ALL_BADGES
    .filter(b => !earnedKeys.has(b.key))
    .map(b => `
      <div title="${b.desc}"
        style="display:flex;flex-direction:column;align-items:center;gap:4px;
          padding:10px 14px;border-radius:12px;
          background:var(--body-bg);border:1.5px solid var(--border);
          opacity:.45;cursor:default;min-width:66px">
        <div style="font-size:24px;filter:grayscale(1)">${b.icon}</div>
        <div style="font-size:10px;font-weight:600;color:var(--text-hint)">${b.name}</div>
      </div>
    `).join("");
}

init();
loadBadges();
</script>
{% endblock %}
