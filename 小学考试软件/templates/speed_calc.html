{% extends "base.html" %}
{% block title %}口算速练 - 小学数学智能练习{% endblock %}

{% block content %}
<div class="page-title">⚡ 口算速练</div>

<!-- 配置区 -->
<div id="config-panel" class="card" style="max-width:600px;margin-bottom:24px">
  <div class="section-title">练习配置</div>
  <div class="grid-2 gap-16 mb-16">
    <div class="form-group">
      <label class="form-label">运算类型（可多选）</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">
        <label style="cursor:pointer"><input type="checkbox" value="+" checked> 加法</label>
        <label style="cursor:pointer"><input type="checkbox" value="-" checked> 减法</label>
        <label style="cursor:pointer"><input type="checkbox" value="×"> 乘法</label>
        <label style="cursor:pointer"><input type="checkbox" value="÷"> 除法</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">数字范围（最大值）</label>
      <select class="form-control" id="max-num">
        <option value="10">10以内</option>
        <option value="20" selected>20以内</option>
        <option value="50">50以内</option>
        <option value="100">100以内</option>
      </select>
    </div>
  </div>
  <div class="grid-2 gap-16 mb-16">
    <div class="form-group">
      <label class="form-label">题目数量</label>
      <select class="form-control" id="q-count">
        <option value="10">10题</option>
        <option value="20" selected>20题</option>
        <option value="30">30题</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">时间限制（秒）</label>
      <select class="form-control" id="time-limit">
        <option value="60">60秒</option>
        <option value="120" selected>120秒</option>
        <option value="180">180秒</option>
        <option value="0">不限时</option>
      </select>
    </div>
  </div>
  <button class="btn btn-primary btn-lg w-full" onclick="startCalc()">⚡ 开始练习</button>
</div>

<!-- 练习区 -->
<div id="calc-panel" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div style="font-size:18px;font-weight:700">
      进度：<span id="progress-text">0/0</span>
    </div>
    <div id="timer-display" style="font-size:24px;font-weight:700;color:var(--primary)">02:00</div>
    <button class="btn btn-secondary btn-sm" onclick="cancelCalc()">取消</button>
  </div>
  <div class="progress-bar mb-24" style="height:8px">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div id="q-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px"></div>
  <div style="text-align:center;margin-top:24px">
    <button class="btn btn-success btn-lg" onclick="submitCalc()">✅ 提交答案</button>
  </div>
</div>

<!-- 结果区 -->
<div id="result-panel" style="display:none"></div>
{% endblock %}

{% block scripts %}
<script>
let questions = [];
let timerInterval = null;
let timeLeft = 0;
let startTime = 0;

function getOps() {
  return [...document.querySelectorAll("input[type=checkbox]:checked")].map(el => el.value);
}

async function startCalc() {
  const ops = getOps();
  if (ops.length === 0) { toast("请至少选择一种运算", "error"); return; }
  const maxNum  = parseInt(document.getElementById("max-num").value);
  const count   = parseInt(document.getElementById("q-count").value);
  const timeLim = parseInt(document.getElementById("time-limit").value);

  questions = await apiFetch("/api/speed-calc/generate", {
    method: "POST",
    body: JSON.stringify({ops, max_num: maxNum, count}),
  });

  // 渲染题目
  document.getElementById("q-grid").innerHTML = questions.map(q => `
    <div style="background:var(--body-bg);border-radius:10px;padding:14px;text-align:center">
      <div style="font-size:18px;font-weight:600;margin-bottom:10px">${q.q} =</div>
      <input class="form-control" id="calc-ans-${q.id}" type="number"
        style="text-align:center;font-size:18px;font-weight:700;padding:8px"
        onkeydown="if(event.key==='Enter')focusNext(${q.id})">
    </div>
  `).join("");

  document.getElementById("config-panel").style.display = "none";
  document.getElementById("calc-panel").style.display = "block";
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("progress-text").textContent = `0/${questions.length}`;
  updateProgress();

  // 定时器
  if (timeLim > 0) {
    timeLeft = timeLim;
    startTime = Date.now();
    updateTimer();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) { clearInterval(timerInterval); submitCalc(); }
    }, 1000);
  } else {
    document.getElementById("timer-display").textContent = "不限时";
    startTime = Date.now();
  }

  // 聚焦第一题
  setTimeout(() => document.getElementById("calc-ans-1")?.focus(), 100);
}

function focusNext(currentId) {
  const next = document.getElementById(`calc-ans-${currentId + 1}`);
  if (next) { next.focus(); next.select(); }
  updateProgress();
}

function updateProgress() {
  const filled = questions.filter(q => document.getElementById(`calc-ans-${q.id}`)?.value !== "").length;
  document.getElementById("progress-text").textContent = `${filled}/${questions.length}`;
  document.getElementById("progress-fill").style.width = `${Math.round(filled/questions.length*100)}%`;
}

function updateTimer() {
  const m = Math.floor(timeLeft / 60).toString().padStart(2, "0");
  const s = (timeLeft % 60).toString().padStart(2, "0");
  const el = document.getElementById("timer-display");
  el.textContent = `${m}:${s}`;
  el.style.color = timeLeft <= 10 ? "var(--danger)" : "var(--primary)";
}

async function submitCalc() {
  if (timerInterval) clearInterval(timerInterval);
  const elapsed = (Date.now() - startTime) / 1000;

  questions.forEach(q => {
    q.student_answer = document.getElementById(`calc-ans-${q.id}`)?.value?.trim() || "";
  });

  const result = await apiFetch("/api/speed-calc/submit", {
    method: "POST",
    body: JSON.stringify({questions, time_seconds: elapsed}),
  });

  document.getElementById("calc-panel").style.display = "none";
  renderResult(result, elapsed);
}

function renderResult(result, elapsed) {
  const panel = document.getElementById("result-panel");
  panel.style.display = "block";
  const color = scoreColor(result.accuracy / 100);
  panel.innerHTML = `
    <div class="card" style="text-align:center;margin-bottom:20px">
      <div style="font-size:56px;font-weight:700;color:${color}">${result.accuracy}%</div>
      <div class="text-hint">正确率 · ${result.correct}/${result.total} 题正确</div>
      <div class="text-hint text-sm mt-8">用时 ${Math.round(elapsed)} 秒</div>
      <div style="margin-top:20px;display:flex;justify-content:center;gap:12px">
        <button class="btn btn-primary" onclick="retry()">再来一次</button>
        <button class="btn btn-secondary" onclick="showConfig()">修改配置</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px">
      ${questions.map(q => {
        const ok = String(q.student_answer).trim() === String(q.answer);
        return `<div style="padding:10px;border-radius:8px;
          background:${ok?"var(--success)":"var(--danger)"}18;
          border:1.5px solid ${ok?"var(--success)":"var(--danger)"}22;
          text-align:center">
          <div style="font-size:13px;color:var(--text-secondary)">${q.q} =</div>
          <div style="font-size:18px;font-weight:700;color:${ok?"var(--success)":"var(--danger)"}">
            ${q.student_answer || "—"}
          </div>
          ${!ok ? `<div style="font-size:11px;color:var(--text-hint)">答案：${q.answer}</div>` : ""}
        </div>`;
      }).join("")}
    </div>
  `;
}

function retry() {
  document.getElementById("result-panel").style.display = "none";
  startCalc();
}

function showConfig() {
  document.getElementById("result-panel").style.display = "none";
  document.getElementById("config-panel").style.display = "block";
}

function cancelCalc() {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById("calc-panel").style.display = "none";
  document.getElementById("config-panel").style.display = "block";
}
</script>
{% endblock %}
