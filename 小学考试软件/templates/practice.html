{% extends "base.html" %}
{% block title %}专项练习 - 小学数学智能练习{% endblock %}

<!-- AI辅导对话弹窗 -->
<div id="guide-modal" style="display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.45);align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;width:480px;max-width:92vw;
    max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2)">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:15px;font-weight:700">🤖 AI 辅导</div>
        <div class="text-hint text-sm" id="guide-q-hint"></div>
      </div>
      <button onclick="closeGuide()" class="btn btn-sm btn-secondary">关闭</button>
    </div>
    <div id="guide-messages" style="flex:1;overflow-y:auto;padding:16px;
      display:flex;flex-direction:column;gap:10px;min-height:200px"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px">
      <input id="guide-input" class="form-control" placeholder="输入你的想法或困惑..."
        onkeydown="if(event.key==='Enter')sendGuide()">
      <button class="btn btn-primary btn-sm" onclick="sendGuide()">发送</button>
    </div>
  </div>
</div>

{% block content %}
<div class="page-title">🎯 专项练习</div>

<div class="card mb-16" style="max-width:600px">
  <div class="section-title">选择知识点</div>
  <div style="display:flex;gap:8px">
    <input class="form-control" id="kp-input" placeholder="输入知识点，如：分数的认识">
    <select class="form-control" id="kp-count" style="width:100px">
      <option value="4">4题</option>
      <option value="6" selected>6题</option>
      <option value="8">8题</option>
      <option value="10">10题</option>
    </select>
    <button class="btn btn-primary" onclick="startPractice()">生成</button>
  </div>
  <div id="kp-suggestions" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px"></div>
</div>

<div id="practice-area"></div>
{% endblock %}

{% block scripts %}
<script>
let currentQuestions = [];
let currentKp = "";

async function loadSuggestedKps() {
  const kps = await apiFetch("/api/wrong-book/kps");
  const box = document.getElementById("kp-suggestions");
  if (kps.length === 0) return;
  box.innerHTML = '<span class="text-hint text-sm" style="align-self:center">薄弱知识点：</span>' +
    kps.slice(0,6).map(kp =>
      `<button class="btn btn-sm badge-orange" onclick="selectKp('${kp}')"
         style="background:var(--body-bg);border:1px solid var(--border);cursor:pointer">${kp}</button>`
    ).join("");
}

function selectKp(kp) {
  document.getElementById("kp-input").value = kp;
}

async function startPractice() {
  const kp = document.getElementById("kp-input").value.trim();
  if (!kp) { toast("请输入知识点", "error"); return; }
  const count = parseInt(document.getElementById("kp-count").value);
  currentKp = kp;

  const area = document.getElementById("practice-area");
  area.innerHTML = `<div style="text-align:center;padding:60px">
    <div class="spinner" style="width:36px;height:36px;margin:0 auto 16px"></div>
    <div style="font-size:15px;font-weight:600">AI 正在生成练习题...</div>
  </div>`;

  try {
    const {task_id} = await apiFetch("/api/practice/generate", {
      method: "POST", body: JSON.stringify({knowledge_point: kp, count}),
    });
    pollTask(task_id, result => {
      currentQuestions = (result.questions || []);
      renderPractice(currentQuestions, kp);
    }, err => {
      area.innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>${err}</div></div>`;
    });
  } catch(e) { toast(e.message, "error"); }
}

function renderPractice(questions, kp) {
  const area = document.getElementById("practice-area");
  area.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div>
        <span style="font-size:15px;font-weight:600">「${kp}」专练</span>
        <span class="text-hint text-sm">&nbsp;共 ${questions.length} 题</span>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="startPractice()">重新生成</button>
    </div>
    ${questions.map((q, i) => renderQuestion(q, i)).join("")}
    <button class="btn btn-primary btn-lg" onclick="gradeAll()" style="margin-top:8px">
      ✅ 提交全部答案
    </button>
  `;
}

function renderQuestion(q, i) {
  return `
    <div class="card mb-16" id="q-card-${q.id}">
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-weight:700;color:var(--primary)">第 ${i+1} 题</span>
        <span class="badge badge-blue">${q.type}</span>
        <span class="badge badge-gray">${q.knowledge_point}</span>
      </div>
      <div style="font-size:15px;line-height:1.8;margin-bottom:12px">${q.content}</div>
      ${q.options && q.options.length ? `
        <div style="margin-bottom:12px">
          ${q.options.map(o => `
            <label style="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer;font-size:14px">
              <input type="radio" name="q${q.id}" value="${o.charAt(0)}" style="margin:0"> ${o}
            </label>
          `).join("")}
        </div>
      ` : `
        <input class="form-control" id="ans-input-${q.id}" placeholder="在此输入答案" style="max-width:300px">
      `}
      <div id="result-${q.id}"></div>
      <div style="margin-top:10px">
        <button class="btn btn-sm btn-secondary"
          onclick='openGuide(${JSON.stringify(q).replace(/"/g,"&quot;")})'>
          💬 不会做？AI来帮
        </button>
      </div>
    </div>
  `;
}

async function gradeAll() {
  for (const q of currentQuestions) {
    let ans = "";
    if (q.options && q.options.length) {
      const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
      ans = checked ? checked.value : "";
    } else {
      ans = (document.getElementById(`ans-input-${q.id}`)?.value || "").trim();
    }
    await gradeOne(q, ans);
  }
  toast("已完成批改！", "success");
}

async function gradeOne(q, ans) {
  const resEl = document.getElementById(`result-${q.id}`);
  resEl.innerHTML = '<span class="spinner" style="width:16px;height:16px"></span>';
  try {
    const result = await apiFetch("/api/practice/grade", {
      method: "POST", body: JSON.stringify({question: q, student_answer: ans || "未作答"}),
    });
    const ok = result.is_correct;
    resEl.innerHTML = `
      <div style="margin-top:12px;padding:12px;border-radius:8px;
        background:${ok?"var(--success)":"var(--danger)"}18;
        border-left:3px solid ${ok?"var(--success)":"var(--danger)"}">
        <div style="font-weight:600;color:${ok?"var(--success)":"var(--danger)"}">
          ${ok ? "✅ 正确！" : "❌ 错误"}
        </div>
        ${!ok ? `
          <div class="text-sm mt-8">
            正确答案：<strong>${q.answer}</strong><br>
            ${result.error_desc ? "错误原因：" + result.error_desc : ""}
          </div>
        ` : ""}
        <button class="btn btn-sm btn-secondary mt-8" onclick="playVoice(${JSON.stringify(q).replace(/"/g,'&quot;')})">
          🔊 语音讲解
        </button>
      </div>
    `;
  } catch(e) {
    resEl.innerHTML = `<div class="text-danger text-sm">${e.message}</div>`;
  }
}

async function playVoice(q) {
  toast("生成语音中...", "info");
  try {
    const grade = (await apiFetch("/api/settings")).default_grade || "三年级";
    const res = await fetch("/api/tts/question", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question: q, grade}),
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    new Audio(url).play();
  } catch(e) { toast("语音生成失败：" + e.message, "error"); }
}

// ── AI 辅导对话 ─────────────────────────────
let _guideQuestion = null;
let _guideHistory = [];

function openGuide(q) {
  _guideQuestion = q;
  _guideHistory = [];
  document.getElementById("guide-q-hint").textContent =
    `${q.type} · ${q.knowledge_point} · ${q.content.slice(0,28)}${q.content.length>28?"...":""}`;
  document.getElementById("guide-messages").innerHTML = `
    <div style="align-self:flex-start;background:var(--primary-light);color:var(--primary);
      padding:10px 14px;border-radius:12px;font-size:13px;max-width:85%">
      你好！遇到困难了？告诉我你觉得哪里不懂，我来一步一步引导你 😊
    </div>
  `;
  document.getElementById("guide-input").value = "";
  document.getElementById("guide-modal").style.display = "flex";
  document.getElementById("guide-input").focus();
}

function closeGuide() {
  document.getElementById("guide-modal").style.display = "none";
}

function appendMsg(role, text) {
  const el = document.getElementById("guide-messages");
  const isAI = role === "assistant";
  const div = document.createElement("div");
  div.style.cssText = `align-self:${isAI?"flex-start":"flex-end"};
    background:${isAI?"var(--primary-light)":"var(--primary)"};
    color:${isAI?"var(--primary)":"#fff"};
    padding:10px 14px;border-radius:12px;font-size:13px;max-width:85%;line-height:1.6`;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function sendGuide() {
  const input = document.getElementById("guide-input");
  const text = input.value.trim();
  if (!text || !_guideQuestion) return;
  input.value = "";
  appendMsg("user", text);
  _guideHistory.push({role:"user", content:text});

  const thinking = document.createElement("div");
  thinking.style.cssText = "align-self:flex-start;color:var(--text-hint);font-size:12px;padding:4px 8px";
  thinking.textContent = "AI 正在思考...";
  document.getElementById("guide-messages").appendChild(thinking);

  try {
    const res = await apiFetch("/api/practice/guide", {
      method:"POST",
      body: JSON.stringify({question: _guideQuestion, history: _guideHistory}),
    });
    thinking.remove();
    appendMsg("assistant", res.reply);
    _guideHistory.push({role:"assistant", content:res.reply});
  } catch(e) {
    thinking.remove();
    appendMsg("assistant", "抱歉，出错了：" + e.message);
  }
}

// 点击遮罩关闭
document.getElementById("guide-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeGuide();
});

// URL 参数预填
const urlKp = getParam("kp");
if (urlKp) {
  document.getElementById("kp-input").value = urlKp;
  startPractice();
}
loadSuggestedKps();
</script>
{% endblock %}
